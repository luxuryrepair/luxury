name: Create Release

# Ejecutar cuando se crea un tag que empiece con 'v'
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-22.04

    steps:
      # 1. Checkout del código
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Extraer versión del tag
      - name: Obtener versión
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="v0.0.0-dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "Versión: $VERSION"

      # 3. Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 4. Instalar dependencias
      - name: Instalar dependencias
        working-directory: ./frontend
        run: npm ci

      # 5. Build Next.js (static export → out/)
      - name: Build proyecto
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH:                   ${{ secrets.NEXT_PUBLIC_BASE_PATH }}
          # Supabase — obligatorios
          NEXT_PUBLIC_SUPABASE_URL:                  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:             ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # EmailJS — opcionales
          NEXT_PUBLIC_EMAILJS_SERVICE_ID:            ${{ secrets.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_BUSINESS_ID:  ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_BUSINESS_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_CLIENT_ID:    ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_CLIENT_ID }}
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY:            ${{ secrets.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}
          # Google Maps embed — opcional
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:           ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}

      # 6. Crear ZIP del build (carpeta out/)
      - name: Crear archivo de distribución
        run: |
          cd frontend/out
          zip -r ../../luxury-repair-${{ steps.get_version.outputs.version }}.zip .
          cd ../..
          echo "ZIP creado: luxury-repair-${{ steps.get_version.outputs.version }}.zip"

      # 7. Generar changelog automático
      - name: Generar changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG="Primera versión del proyecto Luxury Repair."
          else
            COMMITS=$(git log $PREVIOUS_TAG..${{ steps.get_version.outputs.version }} --pretty=format:"- %s (%h)" --no-merges)
            if [ -z "$COMMITS" ]; then
              CHANGELOG="Actualización de versión."
            else
              CHANGELOG=$(printf "## Cambios\n\n%s\n\n---\n**Versión anterior:** %s\n**Nueva versión:** %s" \
                "$COMMITS" "$PREVIOUS_TAG" "${{ steps.get_version.outputs.version }}")
            fi
          fi

          echo "$CHANGELOG" > changelog.md
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # 8. Crear Release en GitHub
      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            # Luxury Repair — ${{ steps.get_version.outputs.version }}

            ## Descargas
            - **luxury-repair-${{ steps.get_version.outputs.version }}.zip** — Build estático del frontend (Next.js export)

            ## Notas de la versión

            ${{ steps.changelog.outputs.changelog }}

            ---

            ## Deploy
            El frontend se despliega automáticamente en GitHub Pages via `deploy.yml`.

            ## Tecnologías
            - Next.js 16 + React 19 (static export)
            - Supabase (servicios, reviews, social links, settings)
            - EmailJS (formulario de contacto)
            - Framer Motion + Lucide React

            ## Configuración de Supabase
            Ejecuta los scripts SQL en `doc/` en el SQL Editor de Supabase:
            - `SUPABASE_SERVICES.sql` — Catálogo de servicios
            - `SUPABASE_SOCIAL_LINKS.sql` — Redes sociales
            - `reviews.sql` — Tabla de reseñas
            - `add_business_info_to_settings.sql` — Info del negocio
            - `create_groq_usage_table.sql` — Registro de uso de IA

            ## Variables de entorno necesarias
            - `NEXT_PUBLIC_SUPABASE_URL`
            - `NEXT_PUBLIC_SUPABASE_ANON_KEY`

            ---
            *Generado automáticamente por GitHub Actions*
          files: |
            luxury-repair-${{ steps.get_version.outputs.version }}.zip
            changelog.md
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 9. Notificación de éxito
      - name: Notificación de éxito
        run: |
          echo "Release ${{ steps.get_version.outputs.version }} creado exitosamente."
          echo "URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.get_version.outputs.version }}"
