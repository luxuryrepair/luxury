name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: ./frontend
        run: npm ci

      - name: Validar secrets configurados
        run: |
          echo "Validando secrets obligatorios..."
          MISSING=()

          [ -z "$SUPABASE_URL" ]      && MISSING+=("NEXT_PUBLIC_SUPABASE_URL")
          [ -z "$SUPABASE_ANON_KEY" ] && MISSING+=("NEXT_PUBLIC_SUPABASE_ANON_KEY")

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "ERROR: faltan secrets obligatorios:"
            for s in "${MISSING[@]}"; do echo "  - $s"; done
            exit 1
          fi

          echo "Secrets obligatorios OK."

          if [ -z "$EMAILJS_SERVICE_ID" ]; then
            echo "AVISO: NEXT_PUBLIC_EMAILJS_SERVICE_ID no configurado"
          fi
          if [ -z "$EMAILJS_TEMPLATE_BUSINESS_ID" ]; then
            echo "AVISO: NEXT_PUBLIC_EMAILJS_TEMPLATE_BUSINESS_ID no configurado"
          fi
          if [ -z "$EMAILJS_TEMPLATE_CLIENT_ID" ]; then
            echo "AVISO: NEXT_PUBLIC_EMAILJS_TEMPLATE_CLIENT_ID no configurado"
          fi
          if [ -z "$EMAILJS_PUBLIC_KEY" ]; then
            echo "AVISO: NEXT_PUBLIC_EMAILJS_PUBLIC_KEY no configurado"
          fi
          if [ -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "AVISO: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY no configurado"
          fi
        env:
          SUPABASE_URL:                 ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY:            ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          EMAILJS_SERVICE_ID:           ${{ secrets.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_BUSINESS_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_BUSINESS_ID }}
          EMAILJS_TEMPLATE_CLIENT_ID:   ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_CLIENT_ID }}
          EMAILJS_PUBLIC_KEY:           ${{ secrets.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}
          GOOGLE_MAPS_API_KEY:          ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}

      - name: Build proyecto
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL:                 ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:            ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL:                     ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_EMAILJS_SERVICE_ID:           ${{ secrets.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_BUSINESS_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_BUSINESS_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_CLIENT_ID:   ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_CLIENT_ID }}
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY:           ${{ secrets.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:          ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          NEXT_PUBLIC_BASE_PATH:                    ${{ secrets.NEXT_PUBLIC_BASE_PATH }}

      - name: Deploy a gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/out
          publish_branch: gh-pages
          commit_message: 'chore: deploy frontend from ${{ github.ref_name }} - ${{ github.sha }}'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'