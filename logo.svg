<!-- Luxury Repair - Logo SVG -->
<svg width="800" height="165" viewBox="0 0 800 165" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Gradiente Oro -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#3a2a00"/>
      <stop offset="25%" stop-color="#b8962e"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="75%" stop-color="#fff4c2"/>
      <stop offset="100%" stop-color="#3a2a00"/>
    </linearGradient>

    <!-- Gradiente Plata -->
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#2b2b2b"/>
      <stop offset="25%" stop-color="#8f8f8f"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="75%" stop-color="#e5e5e5"/>
      <stop offset="100%" stop-color="#2b2b2b"/>
    </linearGradient>

    <!-- Gradiente línea izquierda (oscuro → dorado) -->
    <linearGradient id="lineGradLeft" x1="55" y1="0" x2="128" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#3a2a00"/>
      <stop offset="40%" stop-color="#b8962e"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>

    <!-- Gradiente línea derecha (dorado → oscuro) -->
    <linearGradient id="lineGradRight" x1="672" y1="0" x2="745" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#ffd700"/>
      <stop offset="60%" stop-color="#b8962e"/>
      <stop offset="100%" stop-color="#3a2a00"/>
    </linearGradient>

    <!-- Sombra suave -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Fondo opcional -->
  <rect width="100%" height="100%" fill="#0b0b0b"/>

  <!-- Texto principal -->
  <text x="50%" y="95" text-anchor="middle"
        font-family="Playfair Display, serif"
        font-size="64"
        letter-spacing="8"
        filter="url(#shadow)">

    <tspan fill="url(#goldGrad)">LUXURY</tspan>
    <tspan fill="url(#silverGrad)"> REPAIR</tspan>
  </text>

  <!-- Subtítulo -->
  <g transform="translate(0,140)">
    <line x1="55" y1="0" x2="128" y2="0" stroke="url(#lineGradLeft)" stroke-width="1.5"/>
    <text x="50%" y="5" text-anchor="middle"
          font-family="Montserrat, sans-serif"
          font-size="14"
          letter-spacing="4"
          fill="#d4af37">
      SERVICIO TÉCNICO PREMIUM DE TELEVISORES
    </text>
    <line x1="672" y1="0" x2="745" y2="0" stroke="url(#lineGradRight)" stroke-width="1.5"/>
  </g>

</svg>