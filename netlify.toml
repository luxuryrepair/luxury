[build]
  base = "frontend"
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_BASE_PATH = ""
  # Prevent false positives: these are intentionally public client-side vars.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_BASE_PATH,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_EMAILJS_SERVICE_ID,NEXT_PUBLIC_EMAILJS_TEMPLATE_BUSINESS_ID,NEXT_PUBLIC_EMAILJS_TEMPLATE_CLIENT_ID,NEXT_PUBLIC_EMAILJS_PUBLIC_KEY,NEXT_PUBLIC_GOOGLE_MAPS_API_KEY"
