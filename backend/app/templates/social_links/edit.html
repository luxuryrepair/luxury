{% extends "base.html" %}

{% block title %}Editar Red Social{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{{ url_for('social_links.list') }}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Volver
    </a>
</div>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Editar Enlace: {{ link.platform }}</h2>
</div>

<div class="row">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-body">
                <form method="POST" action="{{ url_for('social_links.edit', link_id=link.id) }}">
                    <!-- Plataforma -->
                    <div class="mb-3">
                        <label for="platform" class="form-label fw-semibold">Plataforma *</label>
                        <input type="text" class="form-control" id="platform" name="platform" value="{{ link.platform }}" required>
                    </div>
                    
                    <!-- URL -->
                    <div class="mb-3">
                        <label for="url" class="form-label fw-semibold">URL *</label>
                        <input type="url" class="form-control" id="url" name="url" value="{{ link.url }}" required>
                    </div>
                    
                    <!-- Icono -->
                    <div class="mb-3">
                        <label for="icon_name" class="form-label fw-semibold">Icono (Lucide React)</label>
                        <input type="text" class="form-control" id="icon_name" name="icon_name" value="{{ link.icon_name }}">
                        <small class="text-muted">Ejemplo: Facebook, Instagram, Twitter</small>
                    </div>
                    
                    <!-- Orden -->
                    <div class="mb-3">
                        <label for="display_order" class="form-label fw-semibold">Orden de Visualización</label>
                        <input type="number" class="form-control" id="display_order" name="display_order" value="{{ link.display_order }}" min="1">
                    </div>
                    
                    <!-- Activo -->
                    <div class="mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="is_active" name="is_active" {% if link.is_active %}checked{% endif %}>
                            <label class="form-check-label" for="is_active">
                                <strong>Activo</strong> - Visible en el sitio web
                            </label>
                        </div>
                    </div>
                    
                    <!-- Botones -->
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Guardar Cambios
                        </button>
                        <a href="{{ url_for('social_links.list') }}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
